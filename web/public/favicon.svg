<svg xmlns="http://www.w3.org/2000/svg" width="230" height="280" viewBox="0 0 230 280">
  <style>
    .theme-dark { display: none; }
    @media (prefers-color-scheme: dark) {
      .theme-light { display: none; }
      .theme-dark { display: inline; }
    }
  </style>
  <image class="theme-light" href="assets/relay-mesh-mark-light.png" width="230" height="280" preserveAspectRatio="xMidYMid meet" />
  <image class="theme-dark" href="assets/relay-mesh-mark-dark.png" width="230" height="280" preserveAspectRatio="xMidYMid meet" />
</svg>
