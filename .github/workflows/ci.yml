name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  web-assets:
    name: Web Assets
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Build frontend assets
        working-directory: web
        env:
          VITE_APP_VERSION: ci-${{ github.sha }}
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build

      - name: Upload web assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  lint:
    name: Lint & Checks
    runs-on: ubuntu-24.04
    needs: [web-assets]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download web assets artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cache cargo directories
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo check
        run: cargo check --locked --all-targets --all-features

  backend-shard-plan:
    name: Backend Shard Plan
    runs-on: ubuntu-24.04
    needs: [web-assets]
    timeout-minutes: 20
    outputs:
      lib-matrix: ${{ steps.matrix.outputs.lib-matrix }}
      bin-matrix: ${{ steps.matrix.outputs.bin-matrix }}
      integration-matrix: ${{ steps.matrix.outputs.integration-matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download web assets artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo directories
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Prepare backend test artifacts
        run: python3 scripts/ci_backend_tests.py prepare-artifacts --output-dir /tmp/backend-test-artifacts

      - name: Upload backend test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: /tmp/backend-test-artifacts
          if-no-files-found: error

      - name: Verify backend shard coverage
        run: python3 scripts/ci_backend_tests.py verify --prebuilt-root /tmp/backend-test-artifacts

      - name: Export backend shard matrices
        id: matrix
        run: |
          set -euo pipefail
          echo "lib-matrix=$(python3 scripts/ci_backend_tests.py matrix --kind lib)" >> "${GITHUB_OUTPUT}"
          echo "bin-matrix=$(python3 scripts/ci_backend_tests.py matrix --kind bin)" >> "${GITHUB_OUTPUT}"
          echo "integration-matrix=$(python3 scripts/ci_backend_tests.py matrix --kind integration)" >> "${GITHUB_OUTPUT}"

  backend-lib-tests:
    name: Backend Lib Tests (${{ matrix.shard.name }})
    runs-on: ubuntu-24.04
    needs: [web-assets, backend-shard-plan]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.backend-shard-plan.outputs.lib-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download web assets artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Download backend test artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-test-artifacts
          path: /tmp/backend-test-artifacts

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo directories
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run library shard
        run: python3 scripts/ci_backend_tests.py run-shard --id "${{ matrix.shard.id }}" --prebuilt-root /tmp/backend-test-artifacts

  backend-bin-tests:
    name: Backend Bin Tests (${{ matrix.shard.name }})
    runs-on: ubuntu-24.04
    needs: [web-assets, backend-shard-plan]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.backend-shard-plan.outputs.bin-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download web assets artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Download backend test artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-test-artifacts
          path: /tmp/backend-test-artifacts

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo directories
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run binary shard
        run: python3 scripts/ci_backend_tests.py run-shard --id "${{ matrix.shard.id }}" --prebuilt-root /tmp/backend-test-artifacts

  backend-integration-tests:
    name: Backend Integration Tests (${{ matrix.shard.name }})
    runs-on: ubuntu-24.04
    needs: [web-assets, backend-shard-plan]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.backend-shard-plan.outputs.integration-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download web assets artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Download backend test artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-test-artifacts
          path: /tmp/backend-test-artifacts

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo directories
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run integration shard
        run: python3 scripts/ci_backend_tests.py run-shard --id "${{ matrix.shard.id }}" --prebuilt-root /tmp/backend-test-artifacts

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-24.04
    needs: [backend-lib-tests, backend-integration-tests, backend-bin-tests]
    if: ${{ always() }}
    timeout-minutes: 5
    steps:
      - name: Validate backend shards
        env:
          BACKEND_LIB_RESULT: ${{ needs.backend-lib-tests.result }}
          BACKEND_INTEGRATION_RESULT: ${{ needs.backend-integration-tests.result }}
          BACKEND_BIN_RESULT: ${{ needs.backend-bin-tests.result }}
        run: |
          set -euo pipefail
          for result in "${BACKEND_LIB_RESULT}" "${BACKEND_INTEGRATION_RESULT}" "${BACKEND_BIN_RESULT}"; do
            if [ "${result}" != "success" ]; then
              echo "backend shard failed with result=${result}"
              exit 1
            fi
          done

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Enforce frontend source budgets
        working-directory: web
        run: bun run test:source-budgets

      - name: Run frontend tests
        working-directory: web
        run: bun test

  compose-smoke-forwardauth-caddy:
    name: Compose Smoke (ForwardAuth + Caddy)
    runs-on: ubuntu-24.04
    needs: [web-assets]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    timeout-minutes: 20
    env:
      BASE_URL: http://127.0.0.1:8787
      COMPOSE_FILE: examples/forwardauth-caddy/docker-compose.yml
      BASIC_AUTH_USER: admin
      BASIC_AUTH_PASS: password
      IMAGE_TAG: tavily-hikari:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download web assets artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq
          docker --version
          docker compose version || (sudo apt-get install -y docker-compose-plugin && docker compose version)

      - name: Build local Docker image (PR checkout)
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --build-arg "APP_EFFECTIVE_VERSION=ci-${GITHUB_SHA}" \
            -t "${IMAGE_TAG}" \
            .

      - name: Start compose stack
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "${COMPOSE_FILE}" ]; then
            echo "Missing compose file: ${COMPOSE_FILE}"
            exit 1
          fi
          export TAVILY_HIKARI_IMAGE="${IMAGE_TAG}"
          docker compose -f "${COMPOSE_FILE}" up -d
          docker compose -f "${COMPOSE_FILE}" ps

      - name: Wait for health endpoint
        shell: bash
        run: |
          set -euo pipefail
          url="${BASE_URL}/health"
          for i in {1..60}; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' "${url}" || true)"
            if [ "${code}" = "200" ]; then
              echo "health: 200"
              exit 0
            fi
            echo "health: ${code} (attempt ${i}/60)"
            sleep 2
          done
          echo "Timed out waiting for ${url}"
          exit 1

      - name: Verify protected endpoint requires auth
        shell: bash
        run: |
          set -euo pipefail
          url="${BASE_URL}/api/profile"
          code="$(curl -sS -o /dev/null -w '%{http_code}' "${url}" || true)"
          if [ "${code}" != "401" ]; then
            echo "Expected 401, got ${code} for ${url}"
            curl -sS -D - -o /dev/null "${url}" || true
            exit 1
          fi

      - name: Verify admin auth returns is_admin=true
        shell: bash
        run: |
          set -euo pipefail
          url="${BASE_URL}/api/profile"
          tmp="$(mktemp)"
          code="$(curl -sS -u "${BASIC_AUTH_USER}:${BASIC_AUTH_PASS}" -o "${tmp}" -w '%{http_code}' "${url}" || true)"
          if [ "${code}" != "200" ]; then
            echo "Expected 200, got ${code} for ${url}"
            cat "${tmp}" || true
            exit 1
          fi
          if ! jq -e '.isAdmin == true' "${tmp}" >/dev/null; then
            echo "Expected isAdmin==true for ${url}, got:"
            cat "${tmp}" || true
            exit 1
          fi
          if ! jq -e '(.displayName == "admin") or (.displayName == "admin@example.com")' "${tmp}" >/dev/null; then
            echo "Expected displayName to be \"admin\" or \"admin@example.com\" for ${url}, got:"
            cat "${tmp}" || true
            exit 1
          fi

      - name: Dump compose logs (on failure)
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f "${COMPOSE_FILE}" ps || true
          docker compose -f "${COMPOSE_FILE}" logs --no-color || true

      - name: Cleanup compose stack
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f "${COMPOSE_FILE}" down -v --remove-orphans || true

  build:
    name: Build (Release)
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    needs: [web-assets]
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download web assets artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Cache cargo directories
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo build (release)
        run: cargo build --release --locked
