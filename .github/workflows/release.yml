name: Release
# portable_release_contract=v1

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      head_sha:
        description: Commit SHA on main to backfill release for
        required: true
        type: string

permissions:
  contents: write
  packages: write
  issues: read
  pull-requests: read

env:
  REGISTRY: ghcr.io
  RELEASE_HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.workflow_run.head_sha }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare (intent + version + tag)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      should_release: ${{ steps.intent.outputs.should_release }}
      bump_level: ${{ steps.intent.outputs.bump_level }}
      release_channel: ${{ steps.intent.outputs.release_channel }}
      pr_number: ${{ steps.intent.outputs.pr_number }}
      pr_url: ${{ steps.intent.outputs.pr_url }}
      release_intent_label: ${{ steps.intent.outputs.release_intent_label }}
      reason: ${{ steps.intent.outputs.reason }}
      version: ${{ steps.tagmeta.outputs.version }}
      tag: ${{ steps.tagmeta.outputs.tag }}
      supports_portable: ${{ steps.capabilities.outputs.supports_portable }}
    steps:
      - name: Checkout (workflow_run)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_HEAD_SHA }}

      - name: Log release target markers
        shell: bash
        run: |
          set -euo pipefail
          echo "RELEASE_REQUESTED_SHA=${RELEASE_HEAD_SHA}"
          echo "RELEASE_TARGET_SHA=${RELEASE_HEAD_SHA}"

      - name: Determine release intent (labels)
        id: intent
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_SHA: ${{ env.RELEASE_HEAD_SHA }}
        run: |
          bash ./.github/scripts/release-intent.sh

      - name: Detect release asset capabilities
        id: capabilities
        shell: bash
        run: |
          set -euo pipefail

          supports_portable=false
          if [[ -f ".github/workflows/release.yml" ]] &&
            grep -Fq 'portable_release_contract=v1' ".github/workflows/release.yml"; then
            supports_portable=true
          fi

          echo "supports_portable=${supports_portable}" >> "${GITHUB_OUTPUT}"

      - name: Determine release version/tag (idempotent)
        id: tagmeta
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        shell: bash
        env:
          BUMP_LEVEL: ${{ steps.intent.outputs.bump_level }}
          RELEASE_CHANNEL: ${{ steps.intent.outputs.release_channel }}
        run: |
          set -euo pipefail

          # If HEAD already has a channel-matching tag, reuse it to keep reruns idempotent.
          if [[ "${RELEASE_CHANNEL}" == "rc" ]]; then
            existing_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9a-f]{7}$' | head -n1 || true)"
          else
            existing_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          fi
          if [[ -n "${existing_tag}" ]]; then
            tag="${existing_tag}"
            version="${tag#v}"
            echo "reuse existing tag on HEAD: ${tag}"
          else
            base_version="$(bash ./.github/scripts/compute-version.sh --print-version)"
            if [[ "${RELEASE_CHANNEL}" == "rc" ]]; then
              sha="${{ env.RELEASE_HEAD_SHA }}"
              short_sha="${sha:0:7}"
              version="${base_version}-rc.${short_sha}"
            else
              version="${base_version}"
            fi

            tag="v${version}"
            echo "computed version: ${version} (tag ${tag}, channel ${RELEASE_CHANNEL})"
          fi

          if [[ "${RELEASE_CHANNEL}" == "stable" ]]; then
            latest_stable_tag="$(
              git tag -l \
                | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' \
                | sed -E 's/^v//' \
                | sort -Vu \
                | tail -n1 \
                || true
            )"

            if [[ -n "${latest_stable_tag}" ]]; then
              if [[ -n "${existing_tag}" ]]; then
                if [[ "${version}" != "${latest_stable_tag}" ]]; then
                  echo "existing stable tag '${version}' on HEAD is behind latest stable '${latest_stable_tag}'" >&2
                  exit 1
                fi
              else
                highest="$(printf '%s\n%s\n' "${latest_stable_tag}" "${version}" | sort -V | tail -n1)"
                if [[ "${highest}" != "${version}" || "${version}" == "${latest_stable_tag}" ]]; then
                  echo "computed stable version '${version}' must be greater than latest stable '${latest_stable_tag}'" >&2
                  exit 1
                fi
              fi
            fi
          fi

          echo "APP_EFFECTIVE_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Configure Git user
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag (if missing)
        if: ${{ steps.intent.outputs.should_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tagmeta.outputs.tag }}"
          if [[ -z "${tag}" ]]; then
            echo "missing tag output" >&2
            exit 2
          fi

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "tag exists: ${tag}"
            exit 0
          fi

          git tag -a "${tag}" -m "${tag}"
          git push origin "${tag}"

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Release prepare"
            echo "- head_sha: ${{ env.RELEASE_HEAD_SHA }}"
            echo "- should_release: ${{ steps.intent.outputs.should_release }}"
            echo "- intent_label: ${{ steps.intent.outputs.release_intent_label }}"
            echo "- bump_level: ${{ steps.intent.outputs.bump_level }}"
            echo "- release_channel: ${{ steps.intent.outputs.release_channel }}"
            echo "- pr: ${{ steps.intent.outputs.pr_number }} (${{ steps.intent.outputs.pr_url }})"
            echo "- reason: ${{ steps.intent.outputs.reason }}"
            echo "- tag: ${{ steps.tagmeta.outputs.tag || '<none>' }}"
            echo "- version: ${{ steps.tagmeta.outputs.version || '<none>' }}"
            echo "- supports_portable: ${{ steps.capabilities.outputs.supports_portable }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  web-assets:
    name: Build web assets
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [prepare]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    env:
      APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout (workflow_run)
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_HEAD_SHA }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Build web assets
        working-directory: web
        env:
          VITE_APP_VERSION: ${{ env.APP_EFFECTIVE_VERSION }}
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build

      - name: Upload web assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-web-dist
          path: web/dist
          if-no-files-found: error

  docker-native:
    name: Build and smoke image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: [prepare, web-assets]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout (workflow_run)
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_HEAD_SHA }}

      - name: Download web assets artifact
        uses: actions/download-artifact@v4
        with:
          name: release-web-dist
          path: web/dist

      - name: Restore release smoke helper for backfill
        shell: bash
        run: |
          set -euo pipefail

          git fetch --no-tags --depth=1 origin main
          force_restore=0
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            force_restore=1
          fi

          for helper_path in \
            ".github/scripts/release-mcp-billing-smoke.sh" \
            ".github/scripts/release_smoke_sqlite_check.py"
          do
            if [[ "${force_restore}" != "1" && ( -x "${helper_path}" || -f "${helper_path}" ) ]]; then
              continue
            fi
            echo "restoring ${helper_path} from origin/main for backfill ${RELEASE_HEAD_SHA}"
            mkdir -p "$(dirname "${helper_path}")"
            git show FETCH_HEAD:"${helper_path}" > "${helper_path}"
            chmod +x "${helper_path}"
          done

      - name: Install Rust native dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Compute lowercase image name
        id: image-name
        shell: bash
        run: |
          set -euo pipefail
          lower="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME_LOWER=${lower}" >> "$GITHUB_ENV"
          echo "LOCAL_SMOKE_IMAGE=tavily-hikari-release-smoke:${GITHUB_RUN_ID}-${{ matrix.arch }}" >> "$GITHUB_ENV"
          echo "DIGEST_FILE=${RUNNER_TEMP}/release-digests/${{ matrix.arch }}.txt" >> "$GITHUB_ENV"
          echo "image_name_lower=${lower}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build local Docker image for MCP billing smoke
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.LOCAL_SMOKE_IMAGE }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ env.APP_EFFECTIVE_VERSION }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}:buildcache-${{ matrix.arch }}

      - name: Build smoke helpers
        run: cargo build --locked --bin mock_tavily

      - name: MCP billing smoke gate
        shell: bash
        env:
          LOCAL_SMOKE_IMAGE: ${{ env.LOCAL_SMOKE_IMAGE }}
        run: |
          ./.github/scripts/release-mcp-billing-smoke.sh

      - name: Extract metadata labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}

      - name: Build and push Docker image by digest
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ env.APP_EFFECTIVE_VERSION }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}:buildcache-${{ matrix.arch }},mode=max

      - name: Export image digest
        shell: bash
        run: |
          set -euo pipefail
          digest="${{ steps.build-push.outputs.digest }}"
          if [[ -z "${digest}" ]]; then
            echo "missing pushed digest for ${{ matrix.arch }}" >&2
            exit 1
          fi

          mkdir -p "$(dirname "${DIGEST_FILE}")"
          printf '%s\n' "${digest}" > "${DIGEST_FILE}"

      - name: Upload image digest
        uses: actions/upload-artifact@v7
        with:
          name: release-digest-${{ matrix.arch }}
          path: ${{ env.DIGEST_FILE }}
          if-no-files-found: error
          overwrite: true

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Native image build (${{ matrix.arch }})"
            echo "- runner: ${{ matrix.runner }}"
            echo "- platform: ${{ matrix.platform }}"
            echo "- version: ${{ env.APP_EFFECTIVE_VERSION }}"
            echo "- digest: ${{ steps.build-push.outputs.digest || '<none>' }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  binary-native:
    name: Build binary release (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    needs: [prepare, web-assets]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Checkout (workflow_run)
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_HEAD_SHA }}

      - name: Download web assets artifact
        uses: actions/download-artifact@v4
        with:
          name: release-web-dist
          path: web/dist

      - name: Install Rust native dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --bin tavily-hikari

      - name: Package release binary
        shell: bash
        run: |
          set -euo pipefail

          release_dir="${RUNNER_TEMP}/release-binary-${{ matrix.arch }}"
          package_root="${release_dir}/tavily-hikari-${RELEASE_TAG}-linux-${{ matrix.arch }}"
          tarball="${release_dir}/tavily-hikari-${RELEASE_TAG}-linux-${{ matrix.arch }}.tar.gz"
          sha_file="${tarball}.sha256"

          mkdir -p "${package_root}"
          install -m 0755 target/release/tavily-hikari "${package_root}/tavily-hikari"
          tar -C "${release_dir}" -czf "${tarball}" "$(basename "${package_root}")"
          (cd "${release_dir}" && sha256sum "$(basename "${tarball}")" > "$(basename "${sha_file}")")

          echo "PACKAGE_ROOT=${package_root}" >> "${GITHUB_ENV}"
          echo "TARBALL=${tarball}" >> "${GITHUB_ENV}"
          echo "SHA_FILE=${sha_file}" >> "${GITHUB_ENV}"

      - name: Smoke packaged binary
        shell: bash
        run: |
          set -euo pipefail

          smoke_root="${RUNNER_TEMP}/release-smoke-${{ matrix.arch }}"
          extract_dir="${smoke_root}/extract"
          db_path="${smoke_root}/data/tavily_proxy.db"
          port="$(
            python3 - <<'PY'
          import socket
          s = socket.socket()
          s.bind(("127.0.0.1", 0))
          print(s.getsockname()[1])
          s.close()
          PY
          )"

          mkdir -p "${extract_dir}" "$(dirname "${db_path}")"
          tar -xzf "${TARBALL}" -C "${extract_dir}"
          binary="${extract_dir}/tavily-hikari-${RELEASE_TAG}-linux-${{ matrix.arch }}/tavily-hikari"

          "${binary}" \
            --bind 127.0.0.1 \
            --port "${port}" \
            --db-path "${db_path}" \
            --dev-open-admin \
            >"${smoke_root}/stdout.log" \
            2>"${smoke_root}/stderr.log" &
          pid=$!
          trap 'kill "${pid}" >/dev/null 2>&1 || true' EXIT

          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:${port}/health" >/dev/null; then
              break
            fi
            if ! kill -0 "${pid}" >/dev/null 2>&1; then
              echo "binary exited early" >&2
              cat "${smoke_root}/stdout.log" >&2 || true
              cat "${smoke_root}/stderr.log" >&2 || true
              exit 1
            fi
            sleep 1
          done

          curl -fsS "http://127.0.0.1:${port}/health" >/dev/null
          curl -fsSL "http://127.0.0.1:${port}/" | grep -qi '<html'
          curl -fsS "http://127.0.0.1:${port}/admin" | grep -qi '<html'
          curl -fsS "http://127.0.0.1:${port}/console" | grep -qi '<html'
          curl -fsS "http://127.0.0.1:${port}/version.json" | grep -q '"version"'
          curl -fsS "http://127.0.0.1:${port}/favicon.svg" >/dev/null
          curl -fsS "http://127.0.0.1:${port}/linuxdo-logo.svg" >/dev/null

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-binary-${{ matrix.arch }}
          path: |
            ${{ env.TARBALL }}
            ${{ env.SHA_FILE }}
          if-no-files-found: error
          overwrite: true

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Binary release (${{ matrix.arch }})"
            echo "- runner: ${{ matrix.runner }}"
            echo "- platform: ${{ matrix.platform }}"
            echo "- tag: ${RELEASE_TAG}"
            echo "- tarball: $(basename "${TARBALL}")"
          } >> "${GITHUB_STEP_SUMMARY}"

  binary-portable:
    name: Build portable binary release (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: [prepare, web-assets]
    if: ${{ needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.supports_portable == 'true' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    env:
      APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Checkout (workflow_run)
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_HEAD_SHA }}

      - name: Download web assets artifact
        uses: actions/download-artifact@v4
        with:
          name: release-web-dist
          path: web/dist

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.0
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-zigbuild --locked --version 0.22.1

      - name: Build portable release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo zigbuild --release --locked --target "${{ matrix.target }}" --bin tavily-hikari

      - name: Verify portable binary linkage
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/tavily-hikari"
          file_output="$(file "${binary}")"
          printf '%s\n' "${file_output}" | tee "${RUNNER_TEMP}/portable-file-${{ matrix.arch }}.log"
          ldd_output="$(ldd "${binary}" 2>&1 || true)"
          printf '%s\n' "${ldd_output}" | tee "${RUNNER_TEMP}/portable-ldd-${{ matrix.arch }}.log"
          readelf_dynamic="$(readelf -d "${binary}" 2>&1 || true)"
          printf '%s\n' "${readelf_dynamic}" | tee "${RUNNER_TEMP}/portable-readelf-dynamic-${{ matrix.arch }}.log"
          readelf_program_headers="$(readelf -l "${binary}" 2>&1 || true)"
          printf '%s\n' "${readelf_program_headers}" | tee "${RUNNER_TEMP}/portable-readelf-program-headers-${{ matrix.arch }}.log"
          if ! grep -Eq 'statically linked|static-pie linked' <<< "${file_output}"; then
            echo "portable binary must be statically linked" >&2
            exit 1
          fi
          if grep -q 'Requesting program interpreter' <<< "${readelf_program_headers}"; then
            echo "portable binary unexpectedly requires a runtime loader" >&2
            exit 1
          fi
          if grep -q '(NEEDED)' <<< "${readelf_dynamic}"; then
            echo "portable binary unexpectedly exposes dynamic library dependencies" >&2
            exit 1
          fi
          if grep -Eq 'libc\.so\.6|ld-linux|libssl|libcrypto|libsqlite3|GLIBC' <<< "${file_output}"$'\n'"${ldd_output}"$'\n'"${readelf_dynamic}"$'\n'"${readelf_program_headers}"; then
            echo "portable binary still exposes forbidden dynamic runtime dependencies" >&2
            exit 1
          fi

      - name: Package portable release binary
        shell: bash
        run: |
          set -euo pipefail

          release_dir="${RUNNER_TEMP}/release-binary-portable-${{ matrix.arch }}"
          package_root="${release_dir}/tavily-hikari-${RELEASE_TAG}-linux-${{ matrix.arch }}-portable"
          tarball="${release_dir}/tavily-hikari-${RELEASE_TAG}-linux-${{ matrix.arch }}-portable.tar.gz"
          sha_file="${tarball}.sha256"

          mkdir -p "${package_root}"
          install -m 0755 "target/${{ matrix.target }}/release/tavily-hikari" "${package_root}/tavily-hikari"
          tar -C "${release_dir}" -czf "${tarball}" "$(basename "${package_root}")"
          (cd "${release_dir}" && sha256sum "$(basename "${tarball}")" > "$(basename "${sha_file}")")

          echo "PACKAGE_ROOT=${package_root}" >> "${GITHUB_ENV}"
          echo "TARBALL=${tarball}" >> "${GITHUB_ENV}"
          echo "SHA_FILE=${sha_file}" >> "${GITHUB_ENV}"

      - name: Smoke portable binary
        shell: bash
        run: |
          set -euo pipefail

          smoke_root="${RUNNER_TEMP}/release-smoke-portable-${{ matrix.arch }}"
          extract_dir="${smoke_root}/extract"
          db_path="${smoke_root}/data/tavily_proxy.db"
          port="$(
            python3 - <<'PY'
          import socket
          s = socket.socket()
          s.bind(("127.0.0.1", 0))
          print(s.getsockname()[1])
          s.close()
          PY
          )"

          mkdir -p "${extract_dir}" "$(dirname "${db_path}")"
          tar -xzf "${TARBALL}" -C "${extract_dir}"
          binary="${extract_dir}/tavily-hikari-${RELEASE_TAG}-linux-${{ matrix.arch }}-portable/tavily-hikari"

          "${binary}" \
            --bind 127.0.0.1 \
            --port "${port}" \
            --db-path "${db_path}" \
            --dev-open-admin \
            >"${smoke_root}/stdout.log" \
            2>"${smoke_root}/stderr.log" &
          pid=$!
          trap 'kill "${pid}" >/dev/null 2>&1 || true' EXIT

          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:${port}/health" >/dev/null; then
              break
            fi
            if ! kill -0 "${pid}" >/dev/null 2>&1; then
              echo "portable binary exited early" >&2
              cat "${smoke_root}/stdout.log" >&2 || true
              cat "${smoke_root}/stderr.log" >&2 || true
              exit 1
            fi
            sleep 1
          done

          curl -fsS "http://127.0.0.1:${port}/health" >/dev/null
          curl -fsSL "http://127.0.0.1:${port}/" | grep -qi '<html'
          curl -fsS "http://127.0.0.1:${port}/admin" | grep -qi '<html'
          curl -fsS "http://127.0.0.1:${port}/console" | grep -qi '<html'
          curl -fsS "http://127.0.0.1:${port}/version.json" | grep -q '"version"'
          curl -fsS "http://127.0.0.1:${port}/favicon.svg" >/dev/null
          curl -fsS "http://127.0.0.1:${port}/linuxdo-logo.svg" >/dev/null

      - name: Upload portable binary artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-binary-portable-${{ matrix.arch }}
          path: |
            ${{ env.TARBALL }}
            ${{ env.SHA_FILE }}
          if-no-files-found: error
          overwrite: true

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Portable binary release (${{ matrix.arch }})"
            echo "- runner: ${{ matrix.runner }}"
            echo "- target: ${{ matrix.target }}"
            echo "- tag: ${RELEASE_TAG}"
            echo "- tarball: $(basename "${TARBALL}")"
          } >> "${GITHUB_STEP_SUMMARY}"

  docker-manifest:
    name: Publish multi-arch manifest (ghcr)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [prepare, docker-native]
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: read
      packages: write
    env:
      APP_EFFECTIVE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Compute lowercase image name
        id: image-name
        shell: bash
        run: |
          set -euo pipefail
          lower="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME_LOWER=${lower}" >> "$GITHUB_ENV"
          echo "image_name_lower=${lower}" >> "$GITHUB_OUTPUT"

      - name: Download image digests
        uses: actions/download-artifact@v8
        with:
          pattern: release-digest-*
          path: ${{ runner.temp }}/release-digests
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name_lower }}
          tags: |
            type=raw,value=latest,enable=${{ needs.prepare.outputs.release_channel == 'stable' }}
            type=raw,value=v${{ env.APP_EFFECTIVE_VERSION }}

      - name: Create multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail

          image="${REGISTRY}/${IMAGE_NAME_LOWER}"
          refs=()
          while IFS= read -r digest_file; do
            digest="$(tr -d '\n' < "${digest_file}")"
            [[ -n "${digest}" ]] || continue
            refs+=("${image}@${digest}")
          done < <(find "${RUNNER_TEMP}/release-digests" -type f -name '*.txt' | sort)

          if [[ "${#refs[@]}" -ne 2 ]]; then
            echo "expected exactly 2 architecture digests, got ${#refs[@]}" >&2
            printf 'refs=%s\n' "${refs[*]}" >&2
            exit 1
          fi

          tag_args=()
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            tag_args+=("-t" "${tag}")
          done <<< "${{ steps.meta.outputs.tags }}"

          if [[ "${#tag_args[@]}" -eq 0 ]]; then
            echo "metadata-action produced no tags" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${refs[@]}"

      - name: Validate manifest platforms
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            inspect_output="$(docker buildx imagetools inspect "${tag}")"
            printf '%s\n' "${inspect_output}"
            grep -q 'linux/amd64' <<< "${inspect_output}"
            grep -q 'linux/arm64' <<< "${inspect_output}"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Multi-arch manifest"
            echo "- version: ${{ env.APP_EFFECTIVE_VERSION }}"
            echo "- tags:"
            while IFS= read -r tag; do
              [[ -n "${tag}" ]] || continue
              echo "  - ${tag}"
            done <<< "${{ steps.meta.outputs.tags }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  github-release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [prepare, docker-manifest, binary-native, binary-portable]
    if: >-
      ${{
        always() &&
        needs.prepare.outputs.should_release == 'true' &&
        needs.prepare.result == 'success' &&
        needs.docker-manifest.result == 'success' &&
        needs.binary-native.result == 'success' &&
        (needs.binary-portable.result == 'success' || needs.binary-portable.result == 'skipped')
      }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Create/Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generateReleaseNotes: true
          allowUpdates: true
          omitBodyDuringUpdate: true
          prerelease: ${{ needs.prepare.outputs.release_channel == 'rc' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download binary release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-binary*
          path: ${{ runner.temp }}/release-binary-assets
          merge-multiple: true

      - name: Upload binary assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          mapfile -d '' assets < <(
            find "${RUNNER_TEMP}/release-binary-assets" -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -print0 | sort -z
          )

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "no binary release assets found" >&2
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber --repo "${GITHUB_REPOSITORY}"

      - name: Upsert PR release comment
        uses: actions/github-script@v9
        env:
          TARGET_SHA: ${{ env.RELEASE_HEAD_SHA }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_CHANNEL: ${{ needs.prepare.outputs.release_channel }}
          RELEASE_PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          RELEASE_SUPPORTS_PORTABLE: ${{ needs.prepare.outputs.supports_portable }}
        with:
          script: |
            const { owner, repo } = context.repo
            const marker = '<!-- tavily-hikari-release-comment -->'
            const rawPrNumber = process.env.RELEASE_PR_NUMBER
            const releaseTag = process.env.RELEASE_TAG
            const releaseVersion = process.env.RELEASE_VERSION
            const releaseChannel = process.env.RELEASE_CHANNEL || '(unknown)'
            const supportsPortable = process.env.RELEASE_SUPPORTS_PORTABLE === 'true'
            const targetSha = process.env.TARGET_SHA || '(unknown)'
            const issueNumber = Number(rawPrNumber)

            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              core.notice('No PR number available for release comment; skipping.')
              return
            }

            if (!releaseTag || !releaseVersion) {
              core.notice('Missing release tag or version; skipping PR release comment.')
              return
            }

            const releaseUrl = `https://github.com/${owner}/${repo}/releases/tag/${releaseTag}`
            const imageBase = `ghcr.io/${`${owner}/${repo}`.toLowerCase()}`
            const imageTags =
              releaseChannel === 'stable'
                ? [`${imageBase}:latest`, `${imageBase}:${releaseTag}`]
                : [`${imageBase}:${releaseTag}`]
            const binaryBase = `tavily-hikari-${releaseTag}`
            const binaryAssets = [
              `${binaryBase}-linux-amd64.tar.gz`,
              `${binaryBase}-linux-amd64.tar.gz.sha256`,
              `${binaryBase}-linux-arm64.tar.gz`,
              `${binaryBase}-linux-arm64.tar.gz.sha256`,
            ]
            if (supportsPortable) {
              binaryAssets.push(
                `${binaryBase}-linux-amd64-portable.tar.gz`,
                `${binaryBase}-linux-amd64-portable.tar.gz.sha256`,
                `${binaryBase}-linux-arm64-portable.tar.gz`,
                `${binaryBase}-linux-arm64-portable.tar.gz.sha256`
              )
            }

            const body = [
              marker,
              `Released in [\`${releaseTag}\`](${releaseUrl})`,
              `Version: \`${releaseVersion}\``,
              `Channel: \`${releaseChannel}\``,
              `Images: ${imageTags.map(tag => `\`${tag}\``).join(', ')}`,
              `Binary assets: ${binaryAssets.map(asset => `\`${asset}\``).join(', ')}`,
              `Commit: \`${targetSha}\``,
            ].join('\n')

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              })

              const foreignMarkerComment = comments.find(comment =>
                typeof comment.body === 'string' &&
                comment.body.includes(marker) &&
                (comment.user?.type !== 'Bot' || comment.user?.login !== 'github-actions[bot]')
              )

              if (foreignMarkerComment) {
                core.warning(
                  `Found marker comment ${foreignMarkerComment.id} owned by ${foreignMarkerComment.user?.login || 'unknown'}; leaving PR comment unchanged`
                )
                return
              }

              const existing = comments.find(comment =>
                typeof comment.body === 'string' &&
                comment.body.includes(marker) &&
                comment.user?.type === 'Bot' &&
                comment.user?.login === 'github-actions[bot]'
              )

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                })
                core.notice(`Updated PR #${issueNumber} release comment for ${releaseTag}`)
                return
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              })
              core.notice(`Created PR #${issueNumber} release comment for ${releaseTag}`)
            } catch (error) {
              const acceptedPermissions =
                error.response?.headers?.['x-accepted-github-permissions'] || '(not provided)'
              const status = error.status || error.response?.status || '(unknown)'
              core.warning(
                `Failed to upsert PR release comment: ${error.message} (status=${status}, accepted_permissions=${acceptedPermissions})`
              )
            }
