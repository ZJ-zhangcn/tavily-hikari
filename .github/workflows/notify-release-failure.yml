name: Notify failed release

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  resolve_release_context:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
    outputs:
      ref_label: ${{ steps.resolve.outputs.ref_label }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      actor: ${{ steps.resolve.outputs.actor }}
      extra_details: ${{ steps.resolve.outputs.extra_details }}
      alert_suppressed: ${{ steps.resolve.outputs.alert_suppressed }}
      rerun_triggered: ${{ steps.resolve.outputs.rerun_triggered }}
    steps:
      - name: Checkout notifier sources
        uses: actions/checkout@v6

      - name: Resolve failed release metadata
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          RUN_EVENT: ${{ github.event.workflow_run.event }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          TRIGGERING_ACTOR: ${{ github.event.workflow_run.triggering_actor.login || github.event.workflow_run.actor.login || github.actor }}
        shell: bash
        run: |
          python3 ./.github/scripts/release_failure_notifier.py

  notify_failure:
    if: >-
      ${{
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'failure' &&
        needs.resolve_release_context.outputs.alert_suppressed != 'true'
      }}
    needs:
      - resolve_release_context
    uses: IvanLi-CN/github-workflows/.github/workflows/release-failure-telegram.yml@main
    with:
      repository: ${{ github.repository }}
      workflow_name: ${{ github.event.workflow_run.name }}
      conclusion: ${{ github.event.workflow_run.conclusion }}
      run_url: ${{ github.event.workflow_run.html_url }}
      ref_label: ${{ needs.resolve_release_context.outputs.ref_label }}
      head_sha: ${{ needs.resolve_release_context.outputs.head_sha }}
      run_attempt: ${{ github.event.workflow_run.run_attempt }}
      actor: ${{ needs.resolve_release_context.outputs.actor }}
      event_name: ${{ github.event.workflow_run.event }}
      extra_details: ${{ needs.resolve_release_context.outputs.extra_details }}
    secrets:
      SHOUTRRR_URL: ${{ secrets.SHOUTRRR_URL }}

  smoke_test:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: IvanLi-CN/github-workflows/.github/workflows/release-failure-telegram.yml@main
    with:
      alert_kind: "release-alert-smoke"
      repository: ${{ github.repository }}
      workflow_name: "Notify failed release"
      conclusion: "failure"
      run_url: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
      ref_label: "${{ format('branch: {0}', github.ref_name) }}"
      head_sha: ${{ github.sha }}
      run_attempt: ${{ github.run_attempt }}
      actor: ${{ github.actor }}
      event_name: "workflow_dispatch"
      extra_details: "manual notifier smoke test"
    secrets:
      SHOUTRRR_URL: ${{ secrets.SHOUTRRR_URL }}
