name: Docs Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docs-gate-plan:
    name: Docs Pages Scope
    runs-on: ubuntu-24.04
    outputs:
      run_docs: ${{ steps.detect.outputs.run_docs }}
      changed_count: ${{ steps.detect.outputs.changed_count }}
      matched_paths: ${{ steps.detect.outputs.matched_paths }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect docs-related changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          base_sha="${PUSH_BEFORE_SHA}"
          head_sha="${PUSH_AFTER_SHA}"
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${PR_BASE_SHA}"
            head_sha="${PR_HEAD_SHA}"
          fi
          python3 .github/scripts/detect_docs_pages_changes.py \
            --event-name "${EVENT_NAME}" \
            --base-sha "${base_sha}" \
            --head-sha "${head_sha}" \
            --output-file "${GITHUB_OUTPUT}"

  build-docs:
    needs: [docs-gate-plan]
    if: ${{ needs.docs-gate-plan.outputs.run_docs == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Compute DOCS_BASE
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY##*/}"
          if [[ "${repo}" == "${owner}.github.io" ]]; then
            echo "DOCS_BASE=/" >> "$GITHUB_ENV"
          else
            echo "DOCS_BASE=/${repo}/" >> "$GITHUB_ENV"
          fi

      - name: Install docs dependencies
        run: bun install --cwd docs-site --frozen-lockfile

      - name: Build docs site
        shell: bash
        run: |
          set -euo pipefail
          cd docs-site
          DOCS_BASE="${DOCS_BASE}" bun run build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-site-build
          path: docs-site/doc_build
          retention-days: 1
          if-no-files-found: error

  build-storybook:
    needs: [docs-gate-plan]
    if: ${{ needs.docs-gate-plan.outputs.run_docs == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install Storybook dependencies and build
        shell: bash
        run: |
          set -euo pipefail
          bun install --cwd web --frozen-lockfile
          cd web
          node ./node_modules/.bin/storybook build --disable-telemetry --quiet

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v7
        with:
          name: storybook-static-build
          path: web/storybook-static
          retention-days: 1
          if-no-files-found: error

  assemble-pages:
    if: ${{ needs.docs-gate-plan.outputs.run_docs == 'true' }}
    runs-on: ubuntu-24.04
    needs: [docs-gate-plan, build-docs, build-storybook]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download docs artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-site-build
          path: .tmp/docs-site

      - name: Download Storybook artifact
        uses: actions/download-artifact@v8
        with:
          name: storybook-static-build
          path: .tmp/storybook-static

      - name: Assemble Pages site
        shell: bash
        run: |
          set -euo pipefail
          bash ./.github/scripts/assemble-pages-site.sh .tmp/docs-site .tmp/storybook-static .tmp/pages-site

      - name: Smoke check assembled site
        shell: bash
        run: |
          set -euo pipefail
          test -f .tmp/pages-site/index.html
          test -f .tmp/pages-site/storybook/index.html
          test -f .tmp/pages-site/storybook.html
          grep -q '/storybook.html' .tmp/pages-site/index.html
          grep -q 'Redirecting to Storybook' .tmp/pages-site/storybook.html
          grep -q './sb-manager/runtime.js' .tmp/pages-site/storybook/index.html

      - name: Upload assembled Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: pages-site-build
          path: .tmp/pages-site
          retention-days: 1
          if-no-files-found: error

  docs-pages-gate:
    name: Docs Pages Gate
    runs-on: ubuntu-24.04
    if: ${{ always() }}
    needs: [docs-gate-plan, build-docs, build-storybook, assemble-pages]
    steps:
      - name: Evaluate docs pages gate
        env:
          DOCS_GATE_PLAN_RESULT: ${{ needs.docs-gate-plan.result }}
          RUN_DOCS: ${{ needs.docs-gate-plan.outputs.run_docs }}
          CHANGED_COUNT: ${{ needs.docs-gate-plan.outputs.changed_count }}
          MATCHED_PATHS: ${{ needs.docs-gate-plan.outputs.matched_paths }}
          BUILD_DOCS_RESULT: ${{ needs.build-docs.result }}
          BUILD_STORYBOOK_RESULT: ${{ needs.build-storybook.result }}
          ASSEMBLE_PAGES_RESULT: ${{ needs.assemble-pages.result }}
        run: |
          set -euo pipefail
          if [[ "${DOCS_GATE_PLAN_RESULT}" != "success" ]]; then
            echo "Docs Pages Gate failed because docs-gate-plan ended with result=${DOCS_GATE_PLAN_RESULT}"
            exit 1
          fi

          if [[ "${RUN_DOCS}" != "true" ]]; then
            echo "Docs Pages Gate satisfied via no-op."
            echo "changed_count=${CHANGED_COUNT}"
            echo "matched_paths=${MATCHED_PATHS:-<none>}"
            exit 0
          fi

          for item in \
            "build-docs:${BUILD_DOCS_RESULT}" \
            "build-storybook:${BUILD_STORYBOOK_RESULT}" \
            "assemble-pages:${ASSEMBLE_PAGES_RESULT}"
          do
            name="${item%%:*}"
            result="${item#*:}"
            if [[ "${result}" != "success" ]]; then
              echo "Docs Pages Gate failed because ${name} ended with result=${result}"
              exit 1
            fi
          done

          echo "Docs Pages Gate passed."
          echo "matched_paths=${MATCHED_PATHS}"

  deploy:
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.docs-gate-plan.outputs.run_docs == 'true' }}
    runs-on: ubuntu-24.04
    needs: [docs-gate-plan, assemble-pages]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download assembled Pages site artifact
        uses: actions/download-artifact@v8
        with:
          name: pages-site-build
          path: .tmp/pages-site

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .tmp/pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
