services:
  edgeone-mock:
    command:
      - /usr/local/bin/mock_edgeone
      - --bind
      - 0.0.0.0:9000
      - --initial-direct-origin
      - node-a:8787
      - --initial-origin-group-id
      - og-core
      - --initial-source-kind
      - direct

  node-a:
    environment:
      HA_SOURCE_KIND: direct
      HA_CORE_DUAL_ACTIVE: "0"
      HA_SYNC_SOURCE_URL: null

  node-b:
    environment:
      HA_SOURCE_KIND: direct
      HA_CORE_DUAL_ACTIVE: "0"
      HA_SYNC_SOURCE_URL: http://node-a:8787
