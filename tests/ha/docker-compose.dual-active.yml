services:
  edgeone-mock:
    command:
      - /usr/local/bin/mock_edgeone
      - --bind
      - 0.0.0.0:9000
      - --initial-direct-origin
      - node-a:8787
      - --initial-origin-group-id
      - og-core
      - --initial-source-kind
      - origin_group

  node-a:
    environment:
      HA_SOURCE_KIND: origin_group
      HA_SOURCE_ORIGIN_GROUP_ID: og-core
      HA_CORE_DUAL_ACTIVE: "1"
      HA_SYNC_SOURCE_URL: null
      HA_PEER_NODES_JSON: >-
        [{"nodeId":"node-b","adminBaseUrl":"http://node-b:8787","publicOrigin":"node-b:8787","roleHint":"standby_candidate"}]

  node-b:
    environment:
      HA_SOURCE_KIND: origin_group
      HA_SOURCE_ORIGIN_GROUP_ID: og-core
      HA_CORE_DUAL_ACTIVE: "1"
      HA_SYNC_SOURCE_URL: null
      HA_PEER_NODES_JSON: >-
        [{"nodeId":"node-a","adminBaseUrl":"http://node-a:8787","publicOrigin":"node-a:8787","roleHint":"observer"}]
